# ─── Font ───────────────────────────────────────
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
disable_ligatures never
modify_font      cell_height 110%

# ─── Cursor ─────────────────────────────────────
cursor_shape          beam
cursor_beam_thickness 1.6
cursor_blink_interval 0.5
cursor_trail          1
cursor_trail_decay    0.1 0.4

# ─── Window / padding ───────────────────────────
window_padding_width        14
single_window_padding_width 14
hide_window_decorations     yes
confirm_os_window_close     0
window_border_width         0
draw_minimal_borders        yes
background_opacity          0.75

# ─── Tabs (only show when >1) ───────────────────
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_min_tabs      2
tab_title_template    "{index}: {title[:25]}"

# ─── Scrollback / bell ──────────────────────────
scrollback_lines        10000
wheel_scroll_min_lines  1
enable_audio_bell       no
visual_bell_duration    0.0

# ─── URL hints ──────────────────────────────────
url_style       curly
detect_urls     yes

include ~/.config/kitty/kitty-matugen-colors.conf

# ─── X Operator Noir overrides ───────────────────
# Keep matugen's monochrome base, but tint Kitty toward the Hyprland/VSCode mauve-blue rice.
background              #15121b
foreground              #e8e1ee
selection_foreground    #15121b
selection_background    #b58ad7
cursor                  #d7b7ff
url_color               #9cc4ff
active_border_color     #b58ad7
inactive_border_color   #29304a
tab_bar_background      #15121b
active_tab_foreground   #15121b
active_tab_background   #d7b7ff
inactive_tab_foreground #b8adc6
inactive_tab_background #252033
color0  #15121b
color8  #514761
color4  #8fb6ff
color12 #a9c8ff
color5  #b58ad7
color13 #d7b7ff
color6  #7dcfff
color14 #9ee7ff
