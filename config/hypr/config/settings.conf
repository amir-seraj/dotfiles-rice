#  ◈ SETTINGS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    border_size = 2
    gaps_in = 6
    gaps_out = 7 14 14 14
    float_gaps = 10
    resize_on_border = true
    extend_border_grab_area = 30
    col.active_border=$active_border
    col.inactive_border=$inactive_border
}

decoration {
    rounding = 14
    active_opacity = 1.0
    inactive_opacity = 0.85
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 1.0
    }
    shadow {
        enabled = true
        range = 22
        render_power = 3
        color = rgba(00000066)
    }
}

input {
    kb_layout = us,ir
    kb_options = grp:win_space_toggle

    touchpad {
        natural_scroll = true
    }
}

cursor {
    no_warps = true
}

misc {
    font_family = JetBrains Mono
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

animations {
    enabled = yes
    bezier = easeOutQuint,    0.22, 1, 0.36, 1
    bezier = easeOutCirc,     0,    0.55, 0.45, 1
    bezier = easeInOutCubic,  0.65, 0, 0.35, 1
    bezier = popBezier,       0.05, 0.9, 0.1, 1.05

    animation = windows,             1, 4, popBezier, popin 85%
    animation = windowsOut,          1, 4, popBezier, popin 85%
    animation = windowsMove,         1, 4, easeOutQuint
    animation = border,              1, 8, easeOutQuint
    animation = fade,                1, 5, easeOutQuint
    animation = layers,              1, 4, easeOutQuint, fade
    animation = layersIn,            1, 4, easeOutQuint, fade
    animation = layersOut,           1, 4, easeOutQuint, fade
    animation = workspaces,          1, 5, easeOutCirc,  slide
    animation = specialWorkspaceIn,  1, 4, easeOutQuint, fade
    animation = specialWorkspaceOut, 1, 4, easeOutQuint, fade
}
