#  ◈ HYPRIDLE CONFIGURATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

general {
    lock_cmd = ~/.config/hypr/scripts/lock.sh
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Pre-lock fade: 5 seconds before the lock kicks in, slowly dim the screen.
# Only takes visible effect when active theme is darko (darko-fade.sh
# checks ~/.config/themes/active.name and exits early on mono).
listener {
    timeout = 595
    on-timeout = ~/.local/bin/darko-fade.sh start
    on-resume  = ~/.local/bin/darko-fade.sh stop
}

listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

listener {
    timeout = 1200
    on-timeout = systemctl suspend
}
